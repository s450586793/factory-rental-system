name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate local compose
        run: docker compose -f docker-compose.yml config

      - name: Validate GHCR compose
        run: |
          BACKEND_IMAGE=ghcr.io/example/project-backend:latest \
          FRONTEND_IMAGE=ghcr.io/example/project-frontend:latest \
          docker compose -f docker-compose.ghcr.yml config

  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            file: ./backend/Dockerfile
            build_args: ""
          - name: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            build_args: VITE_API_BASE_URL=/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
