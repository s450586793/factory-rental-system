name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local compose env
        run: cp .env.example .env

      - name: Validate local compose
        run: docker compose -f docker-compose.yml config

      - name: Validate GHCR compose
        run: docker compose -f docker-compose.ghcr.yml config

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm test

  migration-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: factory_rental
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d factory_rental"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_NAME: factory-rental-system
      NODE_ENV: test
      PORT: 3000
      FRONTEND_ORIGIN: http://localhost:8080
      JWT_SECRET: ci-secret
      COOKIE_NAME: token
      COOKIE_SECURE: false
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123456
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: factory_rental
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SYNCHRONIZE: false
      STORAGE_ROOT: /tmp/factory-rental-storage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run migrations
        run: npm run migration:run

      - name: Seed admin user
        run: npm run seed:admin

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Type-check frontend
        run: npm run type-check

      - name: Build frontend
        run: npm run build

      - name: Run frontend smoke tests
        run: npm test

  build-images:
    runs-on: ubuntu-latest
    needs:
      - validate-compose
      - backend-check
      - migration-smoke
      - frontend-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            file: ./backend/Dockerfile
            build_args: ""
          - name: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            build_args: VITE_API_BASE_URL=/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
