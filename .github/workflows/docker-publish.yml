name: Publish Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            file: ./backend/Dockerfile
            suffix: backend
            build_args: ""
          - name: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            suffix: frontend
            build_args: VITE_API_BASE_URL=/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image names
        id: vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "image=ghcr.io/${owner}/${repo}-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        run: |
          {
            echo "### Published ${{ matrix.name }} image"
            echo
            echo "- Image: \`${{ steps.vars.outputs.image }}\`"
            echo "- Tags:"
            echo '```'
            echo '${{ steps.meta.outputs.tags }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  upload-deploy-bundle:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: github-deploy-bundle
          path: |
            docker-compose.ghcr.yml
            .env.ghcr.example
            docs/database-schema.md
            README.md
