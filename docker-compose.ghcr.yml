name: factory-rental-system

services:
  postgres:
    image: postgres:16
    container_name: factory-rental-postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    image: ${BACKEND_IMAGE}
    container_name: factory-rental-backend
    init: true
    pull_policy: always
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      STORAGE_ROOT: /app/storage
      PDF_FONT_PATH: ${PDF_FONT_PATH}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./volumes/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/api/auth/me', (res) => process.exit(res.statusCode >= 500 ? 1 : 0)).on('error', () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: factory-rental-frontend
    init: true
    pull_policy: always
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${FRONTEND_PORT:-8080}:80"
