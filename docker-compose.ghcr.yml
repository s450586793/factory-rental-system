name: factory-rental-system

services:
  postgres:
    image: postgres:16
    container_name: factory-rental-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: factory_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-this-postgres-password
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factory_rental"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"

  backend:
    image: ghcr.io/s450586793/factory-rental-system-backend:latest
    container_name: factory-rental-backend
    init: true
    pull_policy: always
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: factory_rental
      DB_USER: postgres
      DB_PASSWORD: change-this-postgres-password
      DB_SYNCHRONIZE: "true"
      PORT: "3000"
      JWT_SECRET: change-this-jwt-secret
      COOKIE_SECURE: "false"
      FRONTEND_ORIGIN: http://your-synology-host-or-domain:8080
      STORAGE_ROOT: /app/storage
      PDF_FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-this-admin-password
    volumes:
      - ./volumes/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/api/auth/me', (res) => process.exit(res.statusCode >= 500 ? 1 : 0)).on('error', () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "3000:3000"

  frontend:
    image: ghcr.io/s450586793/factory-rental-system-frontend:latest
    container_name: factory-rental-frontend
    init: true
    pull_policy: always
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "8080:80"
